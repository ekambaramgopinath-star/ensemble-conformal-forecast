version: '3.9'
services:
  thesis:
    build: .
    container_name: thesis_project
    volumes:
      - .:/app
      - ./data:/app/data
      - ./results:/app/results
      - ./reports:/app/reports
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: ["sh", "-c", "python scripts/download_data.py && python scripts/run_pipeline.py && python src/generate_results.py"]
