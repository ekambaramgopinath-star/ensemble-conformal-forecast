project_name: "Thesis_LSTM_GRU_Ensemble"
seed: 42

download:
  ticker: "^GSPC"
  start: "2014-01-01"
  end: "2024-01-01"

data:
  file_path: "data/sp500.csv"
  target_column: "Close"
  window_size: 30
  train_split: 0.6
  cal_split: 0.2

model:
  ensemble_size: 5
  epochs: 15
  batch_size: 32
  dropout_rate: 0.2
  hidden_units: [64, 32]

conformal:
  alpha: 0.1  # 90% Confidence Interval
  agaci_window: 50