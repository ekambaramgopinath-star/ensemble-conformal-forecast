project_name: "Conformal_Ensemble_Thesis"
seed: 42

assets:
  BTC: "data/btc.csv"
  SP500: "data/sp500.csv"
  FX: "data/fx.csv"

asset_tickers:
  BTC: "BTC-USD"
  SP500: "^GSPC"
  FX: "EURUSD=X"

data:
  file_path: "data/sp500.csv"
  target_column: "Close"
  window_size: 30
  train_split: 0.6
  cal_split: 0.2

download:
  ticker: "^GSPC"
  start: "2014-01-01"
  end: "2024-01-01"

model:
  ensemble_size: 5
  epochs: 15
  batch_size: 32
  hidden_units: [64, 32]
  dropout_rate: 0.2

conformal:
  alpha: 0.1
  agaci_window: 50